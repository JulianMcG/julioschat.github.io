<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julio's Chat</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,500;0,700;1,500;1,700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    <!-- Firebase SDK -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="app.js"></script>
</head>

<body>
    <div class="container">
        <!-- Auth Section -->
        <div id="auth-section" class="section">
            <div class="auth-form">
                <div id="login-form" style="display: none;">
                    <h2>Login</h2>
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group before-button">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                    </div>
                    <div class="button-wrapper">
                        <button id="login-button">Login</button>
                    </div>
                    <div class="divider">
                        <span>or</span>
                    </div>
                    <div class="button-wrapper">
                        <button id="google-login-button" class="google-button">
                            <img src="https://ragsdalemartin.com/wp-content/uploads/2020/07/white-google-logo.png"
                                alt="Google logo">
                            Continue with Google
                        </button>
                    </div>
                    <p>Don't have an account? <a href="#" class="auth-link">Sign up</a></p>
                </div>
                <div id="signup-form">
                    <h2>Create New Account</h2>
                    <div class="profile-picture-upload" style="display: none;">
                        <img src="https://i.ibb.co/Gf9VD2MN/pfp.png" alt="Profile Picture" id="profile-picture-preview">
                        <input type="file" id="profile-picture-input" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label for="signup-username">Username</label>
                        <input type="text" id="signup-username" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group before-button">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" placeholder="Enter your password" required>
                    </div>
                    <div class="button-wrapper">
                        <button id="signup-button">Sign Up</button>
                    </div>
                    <div class="divider">
                        <span>or</span>
                    </div>
                    <div class="button-wrapper">
                        <button id="google-signup-button" class="google-button">
                            <img src="https://ragsdalemartin.com/wp-content/uploads/2020/07/white-google-logo.png"
                                alt="Google logo">
                            Continue with Google
                        </button>
                    </div>
                    <p>Already have an account? <a href="#" class="auth-link">Login</a></p>
                </div>
            </div>
        </div>

        <!-- Chat Section -->
        <div id="chat-section" class="section" style="display: none;">
            <div class="chat-container">
                <div class="sidebar">
                    <div class="sidebar-header">
                        <div class="header-left">
                            <h3>Chat</h3>
                        </div>
                        <div class="header-actions">
                            <button class="icon-btn" id="search-toggle" title="Search">
                                <i class="ri-search-line"></i>
                            </button>
                            <button class="new-message-button">
                                <i class="ri-user-add-line"></i>
                                <span class="button-text">New Chat</span>
                            </button>
                        </div>
                    </div>
                    <div class="search-container">
                        <input type="text" id="search-user" placeholder="Search...">
                        <i class="ri-close-line clear-search"></i>
                    </div>
                    <div id="users-container" class="users-list"></div>
                    <div class="profile-section">
                        <div class="profile-info">
                            <img id="current-user-avatar" src="https://i.ibb.co/Gf9VD2MN/pfp.png" alt="Profile Picture">
                            <span id="current-username">Username</span>
                        </div>
                        <i class="ri-settings-3-line settings-icon"></i>
                    </div>
                    <div class="resizer"></div>
                </div>
                <div class="chat-area">
                    <div class="chat-header">
                        <div class="header-user-info" id="chat-header-user-info">
                            <img src="" alt="Profile" class="header-pfp" id="header-pfp">
                            <span class="username" id="active-chat-username">Select a chat</span>
                        </div>
                    </div>
                    <div class="chat-messages" id="chat-messages"></div>
                    <div class="message-input">
                        <input type="text" id="message-input" placeholder="Type a message...">
                        <button class="msg-send-btn" id="send-button" title="Send">
                            <i class="ri-arrow-up-line"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Compose Modal -->
    <div id="compose-modal" class="modal">
        <div class="modal-content">
            <div class="search-container">
                <i class="ri-search-line search-icon"></i>
                <input type="text" id="compose-search" placeholder="Search users...">
            </div>
            <div id="compose-results" class="compose-results"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <i class="ri-close-line close-modal"></i>
            </div>
            <div class="modal-body">
                <div class="profile-picture-upload">
                    <img src="https://i.ibb.co/Gf9VD2MN/pfp.png" alt="Profile Picture" id="settings-profile-picture">
                    <input type="file" id="settings-profile-picture-input" accept="image/*">
                </div>
                <div class="username-change">
                    <label for="settings-username">Username</label>
                    <input type="text" id="settings-username" placeholder="New username">
                    <button class="save-button">Save Changes</button>
                </div>
                <div class="notification-sound">
                    <div class="notification-toggle">
                        <label for="notification-toggle">Enable Notifications</label>
                        <label class="switch">
                            <input type="checkbox" id="notification-toggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="sound-preview">
                        <div class="select-wrapper">
                            <select id="notification-sound" class="sound-select">
                                <option value="Birdy.mp3">Birdy</option>
                                <option value="Entrance.mp3">Entrance</option>
                                <option value="Flutter.mp3">Flutter</option>
                                <option value="Grow.mp3">Grow</option>
                                <option value="Point.mp3">Point</option>
                            </select>
                            <i class="ri-arrow-down-s-line dropdown-icon"></i>
                        </div>
                    </div>
                </div>
                <div class="signout-section">
                    <button class="signout-button">Sign Out</button>
                </div>
            </div>
        </div>
    </div>

    <!-- User Options Modal (Redesigned) -->
    <div id="user-options-modal" class="modal">
        <div class="modal-content friendly-modal">
            <div class="modal-header">
                <h2>Chat Options</h2>
                <i class="ri-close-line close-modal"></i>
            </div>
            <div class="modal-body">
                <div class="user-profile-summary">
                    <img src="" alt="Profile" id="options-modal-pfp" class="modal-pfp">
                    <h3 id="options-modal-username">Username</h3>
                </div>

                <div class="friendly-options-grid">
                    <div class="option-card" id="option-alias">
                        <div class="option-icon"><i class="ri-edit-line"></i></div>
                        <div class="option-details">
                            <h4>Set Alias</h4>
                            <input type="text" id="user-alias" placeholder="Nickname">
                            <button class="small-btn" id="save-alias">Save</button>
                        </div>
                    </div>

                    <div class="option-card" id="option-background">
                        <div class="option-icon"><i class="ri-wallpaper-line"></i></div>
                        <div class="option-details">
                            <h4>Chat Background</h4>
                            <p>Shared with both users</p>
                            <label for="bg-upload" class="upload-btn">Upload Image</label>
                            <input type="file" id="bg-upload" accept="image/*" style="display: none;">
                        </div>
                    </div>

                    <div class="option-card danger-zone" id="option-block">
                        <div class="option-icon"><i class="ri-forbid-2-line"></i></div>
                        <div class="option-details">
                            <h4>Block User</h4>
                            <button class="danger-btn" id="block-user">Block</button>
                            <button class="danger-btn" id="unblock-user" style="display: none;">Unblock</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
